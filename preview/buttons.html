<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>html,body{height:280px}</style></head><body>
    <div class="card">
      <div class="label">Buttons · No rounded corners on structural CTAs</div>
      <div class="row" style="gap:8px;flex-wrap:wrap;align-items:center">
        <button style="font:13px/1 var(--font-header);letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:#08090d;background:linear-gradient(180deg,#e6c875,#c8a040);border:1px solid #8c6f2a;padding:11px 22px;cursor:pointer;box-shadow:inset 0 1px 0 rgba(255,255,255,.3),0 0 18px rgba(212,175,55,.35)">Begin Run</button>
        <button style="font:13px/1 var(--font-header);letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:var(--fg-1);background:linear-gradient(180deg,#25201a,#11100c);border:1px solid #3d3530;padding:11px 22px;cursor:pointer;box-shadow:inset 0 1px 0 rgba(240,232,208,.04)">Inspect</button>
        <button style="font:13px/1 var(--font-header);letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:#f0e8d0;background:linear-gradient(180deg,#7a1a26,#4d0f1a);border:1px solid #2a0a10;padding:11px 22px;cursor:pointer;box-shadow:inset 0 1px 0 rgba(255,255,255,.1)">Abandon</button>
        <button style="font:13px/1 var(--font-header);letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:var(--fg-2);background:transparent;border:1px solid var(--line);padding:11px 22px;cursor:pointer">Ghost</button>
        <button disabled style="font:13px/1 var(--font-header);letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:var(--fg-4);background:#11100c;border:1px solid #1a1610;padding:11px 22px;cursor:not-allowed;opacity:.6">Locked</button>
      </div>
      <div class="label" style="margin-top:8px">Compact &amp; chip variants</div>
      <div class="row" style="gap:6px;flex-wrap:wrap;align-items:center">
        <button style="font:11px/1 var(--font-header);letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:var(--fg-1);background:#1a1610;border:1px solid #3d3530;padding:7px 12px;cursor:pointer">Move</button>
        <button style="font:11px/1 var(--font-header);letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:var(--fg-1);background:#1a1610;border:1px solid #3d3530;padding:7px 12px;cursor:pointer">Attack</button>
        <button style="font:11px/1 var(--font-header);letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:#08090d;background:var(--sacred-gold);border:1px solid #8c6f2a;padding:7px 12px;cursor:pointer">Ability</button>
        <button style="font:11px/1 var(--font-header);letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:var(--fg-1);background:#1a1610;border:1px solid #3d3530;padding:7px 12px;cursor:pointer">Wait</button>
      </div>
    </div></body></html>
