<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>html,body{height:230px}</style></head><body>
    <div class="card">
      <div class="label">Combat semantics · HP / TMP / ETH &amp; combat signals</div>
      <div class="col" style="gap:10px">
        
          <div class="row" style="gap:10px;align-items:center">
            <div style="width:42px;font:13px/1 var(--font-header);letter-spacing:.06em;color:#4cd166;font-weight:700">HP</div>
            <div style="flex:1;height:11px;background:#0a0806;border:1px solid #2a2520;box-shadow:var(--shadow-recess)"><div style="height:100%;width:74%;background:#4cd166;box-shadow:inset 0 1px 0 rgba(255,255,255,.22),0 0 10px #4cd16666"></div></div>
            <div style="font:italic 13px/1.2 var(--font-body);color:var(--fg-2);width:170px">Hit Points · vital flesh</div>
            <div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">#4cd166</div>
          </div>
        
          <div class="row" style="gap:10px;align-items:center">
            <div style="width:42px;font:13px/1 var(--font-header);letter-spacing:.06em;color:#f08020;font-weight:700">TMP</div>
            <div style="flex:1;height:11px;background:#0a0806;border:1px solid #2a2520;box-shadow:var(--shadow-recess)"><div style="height:100%;width:74%;background:#f08020;box-shadow:inset 0 1px 0 rgba(255,255,255,.22),0 0 10px #f0802066"></div></div>
            <div style="font:italic 13px/1.2 var(--font-body);color:var(--fg-2);width:170px">Temper · physical armor</div>
            <div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">#f08020</div>
          </div>
        
          <div class="row" style="gap:10px;align-items:center">
            <div style="width:42px;font:13px/1 var(--font-header);letter-spacing:.06em;color:#a585ff;font-weight:700">ETH</div>
            <div style="flex:1;height:11px;background:#0a0806;border:1px solid #2a2520;box-shadow:var(--shadow-recess)"><div style="height:100%;width:74%;background:#a585ff;box-shadow:inset 0 1px 0 rgba(255,255,255,.22),0 0 10px #a585ff66"></div></div>
            <div style="font:italic 13px/1.2 var(--font-body);color:var(--fg-2);width:170px">Ether · magical armor</div>
            <div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">#a585ff</div>
          </div>
        
        <div class="row" style="gap:7px;flex-wrap:wrap;margin-top:8px">
          <span style="font:14px/1 var(--font-body);font-style:italic;padding:6px 12px;border:1px solid #f5c542;color:#f5c542;background:#f5c54224;font-weight:600;text-shadow:0 0 10px #f5c54255;letter-spacing:.01em">Hit</span><span style="font:14px/1 var(--font-body);font-style:italic;padding:6px 12px;border:1px solid #ffe680;color:#ffe680;background:#ffe68024;font-weight:600;text-shadow:0 0 10px #ffe68055;letter-spacing:.01em">Crit</span><span style="font:14px/1 var(--font-body);font-style:italic;padding:6px 12px;border:1px solid #62e576;color:#62e576;background:#62e57624;font-weight:600;text-shadow:0 0 10px #62e57655;letter-spacing:.01em">Heal</span><span style="font:14px/1 var(--font-body);font-style:italic;padding:6px 12px;border:1px solid #5a544f;color:#5a544f;background:#5a544f24;font-weight:600;text-shadow:0 0 10px #5a544f55;letter-spacing:.01em">Miss</span><span style="font:14px/1 var(--font-body);font-style:italic;padding:6px 12px;border:1px solid #efc46b;color:#efc46b;background:#efc46b24;font-weight:600;text-shadow:0 0 10px #efc46b55;letter-spacing:.01em">Buff</span><span style="font:14px/1 var(--font-body);font-style:italic;padding:6px 12px;border:1px solid #e0304a;color:#e0304a;background:#e0304a24;font-weight:600;text-shadow:0 0 10px #e0304a55;letter-spacing:.01em">Debuff</span>
        </div>
      </div>
    </div></body></html>
