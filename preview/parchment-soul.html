<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>html,body{height:340px}</style></head><body>
    <div class="card" style="padding:16px;background:transparent">
      <div class="parchment" style="padding:30px 36px;display:grid;grid-template-columns:90px 1fr;gap:24px;align-items:start;min-height:280px">
        <div style="border:1.5px solid #6a4a1a;background:#ede0c2;padding:14px 6px;text-align:center;align-self:stretch;display:flex;flex-direction:column;justify-content:center;gap:6px">
          <div class="rubric" style="font-size:10px;letter-spacing:.3em;color:#8c1f1f">SOUL</div>
          <div style="font:48px/1 var(--font-display);font-weight:700;color:var(--ink)">M</div>
          <div style="font:italic 11px/1.2 var(--font-body);color:var(--ink-faded)">Moses<br>met</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:10px">
          <div class="rubric" style="font-size:11px;letter-spacing:.36em;color:#8c1f1f">A historical soul · upper terraces</div>
          <div style="font:36px/1 var(--font-display);font-weight:700;color:var(--ink);letter-spacing:.04em;text-transform:uppercase">Moses</div>
          <hr style="margin:4px 0">
          <p style="font:16px/1.6 var(--font-body);color:var(--ink);margin:0;text-wrap:pretty">
            He killed for justice and was put down for forty years to learn what it cost. He looks at Brennan a long time before he speaks.
          </p>
          <p style="font:italic 15px/1.55 var(--font-body);color:var(--ink-faded);margin:6px 0 0">
            &ldquo;I know that fire. I carried it. I am still carrying what it burned.&rdquo;
          </p>
          <div style="display:flex;gap:6px;margin-top:10px">
            <span style="font:italic 13px/1 var(--font-body);padding:5px 11px;border:1px solid #6a4a1a;color:#2a1d10;background:rgba(106,74,26,.1)">Listen</span>
            <span style="font:italic 13px/1 var(--font-body);padding:5px 11px;border:1px solid #6a4a1a;color:#2a1d10;background:rgba(106,74,26,.1)">Press further</span>
            <span style="font:italic 13px/1 var(--font-body);padding:5px 11px;border:1px solid #8c1f1f;color:#8c1f1f;background:rgba(140,31,31,.08)">Walk away</span>
          </div>
        </div>
      </div>
    </div></body></html>
