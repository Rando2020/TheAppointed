<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>html,body{height:240px}</style></head><body>
  <div class="card">
    <div class="label">Tile catalogue · 96×96 PNG · seamless tiling</div>
    <div style="display:grid;grid-template-columns:repeat(13,1fr);gap:6px;align-items:start">
      
        <div style="display:flex;flex-direction:column;align-items:center;gap:4px;min-width:0">
          <img src="../godot/assets/ui/tiles/grass.png" width="44" height="44" style="border:1px solid #2a2520;image-rendering:pixelated;display:block"/>
          <div style="font:9px/1 var(--font-header);letter-spacing:.12em;text-transform:uppercase;color:var(--fg-3);font-weight:700;text-align:center">Grass</div>
        </div>
      
        <div style="display:flex;flex-direction:column;align-items:center;gap:4px;min-width:0">
          <img src="../godot/assets/ui/tiles/dirt.png" width="44" height="44" style="border:1px solid #2a2520;image-rendering:pixelated;display:block"/>
          <div style="font:9px/1 var(--font-header);letter-spacing:.12em;text-transform:uppercase;color:var(--fg-3);font-weight:700;text-align:center">Dirt</div>
        </div>
      
        <div style="display:flex;flex-direction:column;align-items:center;gap:4px;min-width:0">
          <img src="../godot/assets/ui/tiles/road.png" width="44" height="44" style="border:1px solid #2a2520;image-rendering:pixelated;display:block"/>
          <div style="font:9px/1 var(--font-header);letter-spacing:.12em;text-transform:uppercase;color:var(--fg-3);font-weight:700;text-align:center">Road</div>
        </div>
      
        <div style="display:flex;flex-direction:column;align-items:center;gap:4px;min-width:0">
          <img src="../godot/assets/ui/tiles/stone.png" width="44" height="44" style="border:1px solid #2a2520;image-rendering:pixelated;display:block"/>
          <div style="font:9px/1 var(--font-header);letter-spacing:.12em;text-transform:uppercase;color:var(--fg-3);font-weight:700;text-align:center">Stone</div>
        </div>
      
        <div style="display:flex;flex-direction:column;align-items:center;gap:4px;min-width:0">
          <img src="../godot/assets/ui/tiles/shrine.png" width="44" height="44" style="border:1px solid #2a2520;image-rendering:pixelated;display:block"/>
          <div style="font:9px/1 var(--font-header);letter-spacing:.12em;text-transform:uppercase;color:var(--fg-3);font-weight:700;text-align:center">Shrine</div>
        </div>
      
        <div style="display:flex;flex-direction:column;align-items:center;gap:4px;min-width:0">
          <img src="../godot/assets/ui/tiles/shallow_water.png" width="44" height="44" style="border:1px solid #2a2520;image-rendering:pixelated;display:block"/>
          <div style="font:9px/1 var(--font-header);letter-spacing:.12em;text-transform:uppercase;color:var(--fg-3);font-weight:700;text-align:center">Shallow</div>
        </div>
      
        <div style="display:flex;flex-direction:column;align-items:center;gap:4px;min-width:0">
          <img src="../godot/assets/ui/tiles/deep_water.png" width="44" height="44" style="border:1px solid #2a2520;image-rendering:pixelated;display:block"/>
          <div style="font:9px/1 var(--font-header);letter-spacing:.12em;text-transform:uppercase;color:var(--fg-3);font-weight:700;text-align:center">Deep</div>
        </div>
      
        <div style="display:flex;flex-direction:column;align-items:center;gap:4px;min-width:0">
          <img src="../godot/assets/ui/tiles/high_ground.png" width="44" height="44" style="border:1px solid #2a2520;image-rendering:pixelated;display:block"/>
          <div style="font:9px/1 var(--font-header);letter-spacing:.12em;text-transform:uppercase;color:var(--fg-3);font-weight:700;text-align:center">High</div>
        </div>
      
        <div style="display:flex;flex-direction:column;align-items:center;gap:4px;min-width:0">
          <img src="../godot/assets/ui/tiles/ice.png" width="44" height="44" style="border:1px solid #2a2520;image-rendering:pixelated;display:block"/>
          <div style="font:9px/1 var(--font-header);letter-spacing:.12em;text-transform:uppercase;color:var(--fg-3);font-weight:700;text-align:center">Ice</div>
        </div>
      
        <div style="display:flex;flex-direction:column;align-items:center;gap:4px;min-width:0">
          <img src="../godot/assets/ui/tiles/burning.png" width="44" height="44" style="border:1px solid #2a2520;image-rendering:pixelated;display:block"/>
          <div style="font:9px/1 var(--font-header);letter-spacing:.12em;text-transform:uppercase;color:var(--fg-3);font-weight:700;text-align:center">Burning</div>
        </div>
      
        <div style="display:flex;flex-direction:column;align-items:center;gap:4px;min-width:0">
          <img src="../godot/assets/ui/tiles/electrified_water.png" width="44" height="44" style="border:1px solid #2a2520;image-rendering:pixelated;display:block"/>
          <div style="font:9px/1 var(--font-header);letter-spacing:.12em;text-transform:uppercase;color:var(--fg-3);font-weight:700;text-align:center">Electric</div>
        </div>
      
        <div style="display:flex;flex-direction:column;align-items:center;gap:4px;min-width:0">
          <img src="../godot/assets/ui/tiles/wall.png" width="44" height="44" style="border:1px solid #2a2520;image-rendering:pixelated;display:block"/>
          <div style="font:9px/1 var(--font-header);letter-spacing:.12em;text-transform:uppercase;color:var(--fg-3);font-weight:700;text-align:center">Wall</div>
        </div>
      
        <div style="display:flex;flex-direction:column;align-items:center;gap:4px;min-width:0">
          <img src="../godot/assets/ui/tiles/void_anchor.png" width="44" height="44" style="border:1px solid #2a2520;image-rendering:pixelated;display:block"/>
          <div style="font:9px/1 var(--font-header);letter-spacing:.12em;text-transform:uppercase;color:var(--fg-3);font-weight:700;text-align:center">Void</div>
        </div>
      
    </div>
    <div class="label" style="margin-top:8px;color:var(--fg-3)">Overlays · drawn on top of any base tile to mark state</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:340px">
      
        <div style="position:relative;width:60px;height:60px">
          <img src="../godot/assets/ui/tiles/grass.png" width="60" height="60" style="border:1px solid #2a2520;image-rendering:pixelated;display:block;position:absolute"/>
          <img src="../godot/assets/ui/tiles/ice_overlay.png" width="60" height="60" style="image-rendering:pixelated;display:block;position:absolute;mix-blend-mode:normal"/>
          <div style="position:absolute;left:0;right:0;top:62px;font:9px/1 var(--font-header);letter-spacing:.12em;text-transform:uppercase;color:var(--fg-3);font-weight:700;text-align:center">ice</div>
        </div>
      
        <div style="position:relative;width:60px;height:60px">
          <img src="../godot/assets/ui/tiles/grass.png" width="60" height="60" style="border:1px solid #2a2520;image-rendering:pixelated;display:block;position:absolute"/>
          <img src="../godot/assets/ui/tiles/burning_overlay.png" width="60" height="60" style="image-rendering:pixelated;display:block;position:absolute;mix-blend-mode:normal"/>
          <div style="position:absolute;left:0;right:0;top:62px;font:9px/1 var(--font-header);letter-spacing:.12em;text-transform:uppercase;color:var(--fg-3);font-weight:700;text-align:center">burning</div>
        </div>
      
        <div style="position:relative;width:60px;height:60px">
          <img src="../godot/assets/ui/tiles/grass.png" width="60" height="60" style="border:1px solid #2a2520;image-rendering:pixelated;display:block;position:absolute"/>
          <img src="../godot/assets/ui/tiles/electrified_overlay.png" width="60" height="60" style="image-rendering:pixelated;display:block;position:absolute;mix-blend-mode:normal"/>
          <div style="position:absolute;left:0;right:0;top:62px;font:9px/1 var(--font-header);letter-spacing:.12em;text-transform:uppercase;color:var(--fg-3);font-weight:700;text-align:center">electrified</div>
        </div>
      
        <div style="position:relative;width:60px;height:60px">
          <img src="../godot/assets/ui/tiles/grass.png" width="60" height="60" style="border:1px solid #2a2520;image-rendering:pixelated;display:block;position:absolute"/>
          <img src="../godot/assets/ui/tiles/void_overlay.png" width="60" height="60" style="image-rendering:pixelated;display:block;position:absolute;mix-blend-mode:normal"/>
          <div style="position:absolute;left:0;right:0;top:62px;font:9px/1 var(--font-header);letter-spacing:.12em;text-transform:uppercase;color:var(--fg-3);font-weight:700;text-align:center">void</div>
        </div>
      
    </div>
  </div></body></html>
