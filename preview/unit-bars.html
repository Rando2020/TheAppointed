<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>html,body{height:220px}</style></head><body>
    <div class="card">
      <div class="label">Unit status bars · in-tile micro display</div>
      <div class="row" style="gap:14px;align-items:flex-start">
        <div style="background:var(--surface-1);border:1px solid #2a2520;padding:12px;display:flex;flex-direction:column;gap:6px;width:170px;box-shadow:var(--shadow-recess)">
          <div class="row" style="gap:8px;align-items:center">
            <div style="width:36px;height:36px;background:#d4af3722;border:1px solid var(--pride-gold);display:grid;place-items:center;font:18px/1 var(--font-display);font-weight:700;color:var(--pride-gold)">A</div>
            <div class="col" style="gap:0;flex:1;min-width:0">
              <div style="font:13px/1.1 var(--font-header);letter-spacing:.04em;color:var(--fg-1);font-weight:700">AERYN</div>
              <div style="font:italic 11px/1.2 var(--font-body);color:var(--fg-3)">Soldier · Lv 7</div>
            </div>
          </div>
          
            <div class="row" style="gap:6px;align-items:center">
              <div style="width:26px;font:10px/1 var(--font-header);letter-spacing:.16em;color:#6ea36a;font-weight:700">HP</div>
              <div style="flex:1;height:6px;background:#0a0806;border:1px solid #1a1410;overflow:hidden"><div style="height:100%;width:75.51020408163265%;background:#6ea36a"></div></div>
              <div style="font-family:var(--font-mono);font-size:9px;color:var(--fg-3);width:38px;text-align:right">74/98</div>
            </div>
          
            <div class="row" style="gap:6px;align-items:center">
              <div style="width:26px;font:10px/1 var(--font-header);letter-spacing:.16em;color:#b06a3a;font-weight:700">TMP</div>
              <div style="flex:1;height:6px;background:#0a0806;border:1px solid #1a1410;overflow:hidden"><div style="height:100%;width:83.33333333333334%;background:#b06a3a"></div></div>
              <div style="font-family:var(--font-mono);font-size:9px;color:var(--fg-3);width:38px;text-align:right">60/72</div>
            </div>
          
            <div class="row" style="gap:6px;align-items:center">
              <div style="width:26px;font:10px/1 var(--font-header);letter-spacing:.16em;color:#7a6ca6;font-weight:700">ETH</div>
              <div style="flex:1;height:6px;background:#0a0806;border:1px solid #1a1410;overflow:hidden"><div style="height:100%;width:76.36363636363637%;background:#7a6ca6"></div></div>
              <div style="font-family:var(--font-mono);font-size:9px;color:var(--fg-3);width:38px;text-align:right">42/55</div>
            </div>
          
        </div>
        <div style="background:var(--surface-1);border:1px solid #2a2520;padding:12px;display:flex;flex-direction:column;gap:6px;width:170px;box-shadow:var(--shadow-recess)">
          <div class="row" style="gap:8px;align-items:center">
            <div style="width:36px;height:36px;background:#9b233522;border:1px solid var(--crimson);display:grid;place-items:center;font:16px/1 var(--font-display);font-weight:700;color:var(--crimson)">E</div>
            <div class="col" style="gap:0;flex:1;min-width:0">
              <div style="font:13px/1.1 var(--font-header);letter-spacing:.04em;color:var(--fg-1);font-weight:700">FALLEN</div>
              <div style="font:italic 11px/1.2 var(--font-body);color:var(--fg-3)">Veriel · Tier 3</div>
            </div>
          </div>
          
            <div class="row" style="gap:6px;align-items:center">
              <div style="width:26px;font:10px/1 var(--font-header);letter-spacing:.16em;color:#6ea36a;font-weight:700">HP</div>
              <div style="flex:1;height:6px;background:#0a0806;border:1px solid #1a1410;overflow:hidden"><div style="height:100%;width:15.714285714285714%;background:#6ea36a"></div></div>
              <div style="font-family:var(--font-mono);font-size:9px;color:var(--fg-3);width:38px;text-align:right">22/140</div>
            </div>
          
            <div class="row" style="gap:6px;align-items:center">
              <div style="width:26px;font:10px/1 var(--font-header);letter-spacing:.16em;color:#b06a3a;font-weight:700">TMP</div>
              <div style="flex:1;height:6px;background:#0a0806;border:1px solid #1a1410;overflow:hidden"><div style="height:100%;width:0%;background:#b06a3a"></div></div>
              <div style="font-family:var(--font-mono);font-size:9px;color:var(--fg-3);width:38px;text-align:right">0/80</div>
            </div>
          
            <div class="row" style="gap:6px;align-items:center">
              <div style="width:26px;font:10px/1 var(--font-header);letter-spacing:.16em;color:#7a6ca6;font-weight:700">ETH</div>
              <div style="flex:1;height:6px;background:#0a0806;border:1px solid #1a1410;overflow:hidden"><div style="height:100%;width:63.33333333333333%;background:#7a6ca6"></div></div>
              <div style="font-family:var(--font-mono);font-size:9px;color:var(--fg-3);width:38px;text-align:right">38/60</div>
            </div>
          
        </div>
      </div>
    </div></body></html>
