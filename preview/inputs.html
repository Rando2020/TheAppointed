<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>html,body{height:280px}</style></head><body>
    <div class="card">
      <div class="label">Form inputs · recessed, iron-bound</div>
      <div class="col" style="gap:12px">
        <div class="col" style="gap:4px">
          <label class="label">Soul name</label>

            <option>Envy — Righteous Advocacy</option>
          </select>
        </div>

          <div style="height:10px;background:#0a0806;border:1px solid #2a2520;box-shadow:inset 0 2px 6px rgba(0,0,0,.6);position:relative">
            <div style="height:100%;width:68%;background:linear-gradient(90deg,var(--crimson),var(--sacred-gold));box-shadow:inset 0 1px 0 rgba(255,255,255,.15)"></div>

        </div>
