<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>html,body{height:280px}</style></head><body>
    <div class="card">
      <div class="label">Tier frames · same panel, different revelation tier</div>
      <div class="row" style="gap:10px;align-items:stretch">
        
          <div class="grow" style="background:linear-gradient(180deg,#4a6fa51a,transparent),var(--surface-1);border:1px solid #4a6fa580;padding:14px;min-height:170px;display:flex;flex-direction:column;gap:8px;">
            <div style="font:11px/1 var(--font-header);letter-spacing:.2em;text-transform:uppercase;color:#4a6fa5;font-weight:700">TIER 1</div>
            <div style="font:18px/1 var(--font-header);color:var(--fg-1);font-weight:700;letter-spacing:.06em;text-transform:uppercase">The War</div>
            <div style="font:italic 12px/1.4 var(--font-body);color:var(--fg-3)">Tactical · cold</div>
            <div style="margin-top:auto;font-family:var(--font-mono);font-size:9px;color:var(--fg-3)">--tier-1</div>
          </div>
        
          <div class="grow" style="background:linear-gradient(180deg,#8a3a3a1a,transparent),var(--surface-1);border:1px solid #8a3a3a80;padding:14px;min-height:170px;display:flex;flex-direction:column;gap:8px;">
            <div style="font:11px/1 var(--font-header);letter-spacing:.2em;text-transform:uppercase;color:#8a3a3a;font-weight:700">TIER 3</div>
            <div style="font:18px/1 var(--font-header);color:var(--fg-1);font-weight:700;letter-spacing:.06em;text-transform:uppercase">The Fallen</div>
            <div style="font:italic 12px/1.4 var(--font-body);color:var(--fg-3)">Bosses remember you</div>
            <div style="margin-top:auto;font-family:var(--font-mono);font-size:9px;color:var(--fg-3)">--tier-3</div>
          </div>
        
          <div class="grow" style="background:linear-gradient(180deg,#e8e0d01a,transparent),var(--surface-1);border:1px solid #e8e0d080;padding:14px;min-height:170px;display:flex;flex-direction:column;gap:8px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.5),0 0 32px #e8e0d040,0 0 2px #e8e0d0">
            <div style="font:11px/1 var(--font-header);letter-spacing:.2em;text-transform:uppercase;color:#e8e0d0;font-weight:700">TIER 5</div>
            <div style="font:22px/1 var(--font-display);color:var(--fg-1);font-weight:700;letter-spacing:.12em;text-transform:uppercase">The Ascent</div>
            <div style="font:italic 12px/1.4 var(--font-body);color:var(--fg-3)">The loop can end</div>
            <div style="margin-top:auto;font-family:var(--font-mono);font-size:9px;color:var(--fg-3)">--tier-5</div>
          </div>
        
      </div>
    </div></body></html>
