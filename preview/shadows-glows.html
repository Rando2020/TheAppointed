<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>html,body{height:240px}</style></head><body>
    <div class="card">
      <div class="label">Elevation · interior depth, not material drop shadows</div>
      <div class="row" style="gap:10px;align-items:stretch">
        <div class="grow" style="background:var(--surface-2);padding:18px;min-height:108px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:inset 0 0 0 1px rgba(0,0,0,.6),inset 0 1px 0 rgba(240,232,208,.04);border:1px solid var(--line-2)"><div style="font:11px/1 var(--font-header);letter-spacing:.16em;text-transform:uppercase;color:var(--fg-3)">Inset deep</div><div style="font-family:var(--font-mono);font-size:9px;color:var(--fg-3)">interior pressed</div></div>
        <div class="grow" style="background:var(--surface-2);padding:18px;min-height:108px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:inset 0 2px 8px rgba(0,0,0,.6);border:1px solid var(--line-2)"><div style="font:11px/1 var(--font-header);letter-spacing:.16em;text-transform:uppercase;color:var(--fg-3)">Recess</div><div style="font-family:var(--font-mono);font-size:9px;color:var(--fg-3)">inputs, tracks</div></div>
        <div class="grow" style="background:var(--surface-2);padding:18px;min-height:108px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:0 0 24px rgba(255,216,107,.35),0 0 2px rgba(212,175,55,.8);border:1px solid var(--line-hot)"><div style="font:11px/1 var(--font-header);letter-spacing:.16em;text-transform:uppercase;color:var(--sacred-gold)">Sacred glow</div><div style="font-family:var(--font-mono);font-size:9px;color:var(--fg-3)">tier 4-5 only</div></div>
        <div class="grow" style="background:var(--surface-2);padding:18px;min-height:108px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:0 0 20px rgba(155,35,53,.35);border:1px solid rgba(155,35,53,.5)"><div style="font:11px/1 var(--font-header);letter-spacing:.16em;text-transform:uppercase;color:var(--crimson)">Crimson glow</div><div style="font-family:var(--font-mono);font-size:9px;color:var(--fg-3)">danger / boss</div></div>
      </div>
    </div></body></html>
