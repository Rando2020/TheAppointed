<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>html,body{height:240px}</style></head><body>
    <div class="card">
      <div class="label">Borders · Stone &amp; iron · no rounded corners on structural elements</div>
      <div class="row" style="gap:10px;align-items:stretch">
        <div class="grow" style="border:1px solid rgba(200,169,110,.18);background:var(--surface-1);padding:14px;min-height:96px;display:flex;flex-direction:column;justify-content:space-between"><div style="font:11px/1 var(--font-header);letter-spacing:.16em;text-transform:uppercase;color:var(--fg-3)">Thin · Hairline</div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">1px brass 18%</div></div>
        <div class="grow" style="border:1px solid #2a2520;background:var(--surface-1);padding:14px;min-height:96px;display:flex;flex-direction:column;justify-content:space-between"><div style="font:11px/1 var(--font-header);letter-spacing:.16em;text-transform:uppercase;color:var(--fg-3)">Iron</div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">1px #2a2520</div></div>
        <div class="grow" style="border:1px solid rgba(212,175,55,.55);background:var(--surface-1);padding:14px;min-height:96px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:0 0 0 4px rgba(0,0,0,.4)"><div style="font:11px/1 var(--font-header);letter-spacing:.16em;text-transform:uppercase;color:var(--sacred-gold)">Sacred</div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">brass 55% + halo</div></div>
        <div class="grow" style="border:3px double var(--hub-warm);background:var(--surface-1);padding:14px;min-height:96px;display:flex;flex-direction:column;justify-content:space-between"><div style="font:11px/1 var(--font-header);letter-spacing:.16em;text-transform:uppercase;color:var(--hub-warm)">Double</div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">3px double brass</div></div>
      </div>
    </div></body></html>
