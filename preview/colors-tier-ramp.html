<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>html,body{height:240px}</style></head><body>
    <div class="card">
      <div class="label">Revelation Tier · Color temperature shift</div>
      <div class="row" style="gap:0;align-items:stretch;border:1px solid var(--line-2)">
        
          <div class="grow" style="background:linear-gradient(180deg,#4a6fa533,#4a6fa511);border-right:1px solid rgba(0,0,0,.4);padding:12px 10px;display:flex;flex-direction:column;gap:6px;min-width:0">

            <div style="font:11px/1.3 var(--font-body);color:var(--fg-3);font-style:italic">Cold blue — tactical</div>

          </div>

          </div>
