<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>html,body{height:200px}</style></head><body>
    <div class="card">
      <div class="label">Chips · status / element / tier</div>
      <div class="row" style="gap:6px;flex-wrap:wrap;align-items:center">
        <span style="font:10px/1 var(--font-header);letter-spacing:.2em;text-transform:uppercase;font-weight:700;padding:5px 9px;border:1px solid #ffd86b66;color:#ffd86b;background:#ffd86b1c">BLESSED</span><span style="font:10px/1 var(--font-header);letter-spacing:.2em;text-transform:uppercase;font-weight:700;padding:5px 9px;border:1px solid #7a6ca666;color:#7a6ca6;background:#7a6ca61c">STUNNED</span><span style="font:10px/1 var(--font-header);letter-spacing:.2em;text-transform:uppercase;font-weight:700;padding:5px 9px;border:1px solid #ff6b3a66;color:#ff6b3a;background:#ff6b3a1c">BURNING</span><span style="font:10px/1 var(--font-header);letter-spacing:.2em;text-transform:uppercase;font-weight:700;padding:5px 9px;border:1px solid #67e8f966;color:#67e8f9;background:#67e8f91c">IMMOBILE</span><span style="font:10px/1 var(--font-header);letter-spacing:.2em;text-transform:uppercase;font-weight:700;padding:5px 9px;border:1px solid #a3a3a366;color:#a3a3a3;background:#a3a3a31c">SLOWED</span><span style="font:10px/1 var(--font-header);letter-spacing:.2em;text-transform:uppercase;font-weight:700;padding:5px 9px;border:1px solid #9b233566;color:#9b2335;background:#9b23351c">BLEEDING</span>
      </div>
      <div class="row" style="gap:6px;flex-wrap:wrap;align-items:center">
        <span style="font:10px/1 var(--font-header);letter-spacing:.2em;text-transform:uppercase;font-weight:700;padding:5px 9px;border:1px solid #f9731666;color:#f97316;background:#f973161c">FIRE</span><span style="font:10px/1 var(--font-header);letter-spacing:.2em;text-transform:uppercase;font-weight:700;padding:5px 9px;border:1px solid #67e8f966;color:#67e8f9;background:#67e8f91c">ICE</span><span style="font:10px/1 var(--font-header);letter-spacing:.2em;text-transform:uppercase;font-weight:700;padding:5px 9px;border:1px solid #fde04766;color:#fde047;background:#fde0471c">THUNDER</span><span style="font:10px/1 var(--font-header);letter-spacing:.2em;text-transform:uppercase;font-weight:700;padding:5px 9px;border:1px solid #38bdf866;color:#38bdf8;background:#38bdf81c">WATER</span><span style="font:10px/1 var(--font-header);letter-spacing:.2em;text-transform:uppercase;font-weight:700;padding:5px 9px;border:1px solid #fef08a66;color:#fef08a;background:#fef08a1c">HOLY</span><span style="font:10px/1 var(--font-header);letter-spacing:.2em;text-transform:uppercase;font-weight:700;padding:5px 9px;border:1px solid #a855f766;color:#a855f7;background:#a855f71c">DARK</span><span style="font:10px/1 var(--font-header);letter-spacing:.2em;text-transform:uppercase;font-weight:700;padding:5px 9px;border:1px solid #a3a3a366;color:#a3a3a3;background:#a3a3a31c">EARTH</span>
      </div>
      <div class="row" style="gap:6px;flex-wrap:wrap;align-items:center;margin-top:4px">
        <span style="font:11px/1 var(--font-header);letter-spacing:.18em;text-transform:uppercase;font-weight:700;padding:6px 11px;border:1px solid #4a6fa5;color:#4a6fa5;background:#4a6fa51c">Tier 1 · The War</span><span style="font:11px/1 var(--font-header);letter-spacing:.18em;text-transform:uppercase;font-weight:700;padding:6px 11px;border:1px solid #7a5c8a;color:#7a5c8a;background:#7a5c8a1c">Tier 2 · The Cracks</span><span style="font:11px/1 var(--font-header);letter-spacing:.18em;text-transform:uppercase;font-weight:700;padding:6px 11px;border:1px solid #8a3a3a;color:#8a3a3a;background:#8a3a3a1c">Tier 3 · The Fallen</span><span style="font:11px/1 var(--font-header);letter-spacing:.18em;text-transform:uppercase;font-weight:700;padding:6px 11px;border:1px solid #c8a040;color:#c8a040;background:#c8a0401c">Tier 4 · The Pattern</span><span style="font:11px/1 var(--font-header);letter-spacing:.18em;text-transform:uppercase;font-weight:700;padding:6px 11px;border:1px solid #e8e0d0;color:#e8e0d0;background:#e8e0d01c">Tier 5 · The Ascent</span>
      </div>
    </div></body></html>
