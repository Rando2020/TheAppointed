<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Ground shadow -->
  <ellipse cx="32" cy="60" rx="14" ry="3.5" fill="#00000055"/>

  <!-- === SWORD (behind body) === -->
  <rect x="44" y="10" width="4" height="28" rx="1" fill="#c8cce8" stroke="#1a1a2e" stroke-width="1.2"/>
  <rect x="40" y="19" width="12" height="3" rx="1" fill="#8b6010" stroke="#1a1a2e" stroke-width="1"/>
  <polygon points="44,10 48,10 46,6" fill="#e0e4f8" stroke="#1a1a2e" stroke-width="1"/>

  <!-- === SHIELD (behind body) === -->
  <rect x="12" y="24" width="11" height="15" rx="2" fill="#3355aa" stroke="#1a1a2e" stroke-width="1.2"/>
  <rect x="14" y="26" width="7" height="11" rx="1" fill="#4466cc"/>
  <circle cx="17" cy="31" r="2.5" fill="#2244aa" stroke="#1a1a2e" stroke-width="0.8"/>
  <line x1="17" y1="27" x2="17" y2="35" stroke="#5577dd" stroke-width="1"/>

  <!-- === LEGS === -->
  <rect x="20" y="44" width="10" height="13" rx="2" fill="#1133aa" stroke="#1a1a2e" stroke-width="1.2"/>
  <rect x="33" y="44" width="10" height="13" rx="2" fill="#1133aa" stroke="#1a1a2e" stroke-width="1.2"/>
  <!-- knee plates -->
  <rect x="20" y="44" width="10" height="4" rx="1" fill="#2244cc"/>
  <rect x="33" y="44" width="10" height="4" rx="1" fill="#2244cc"/>
  <!-- boots -->
  <rect x="18" y="53" width="13" height="7" rx="2" fill="#3d2510" stroke="#1a1a2e" stroke-width="1"/>
  <rect x="32" y="53" width="13" height="7" rx="2" fill="#3d2510" stroke="#1a1a2e" stroke-width="1"/>

  <!-- === BODY (plate) === -->
  <rect x="19" y="24" width="25" height="21" rx="2" fill="#2244cc" stroke="#1a1a2e" stroke-width="1.4"/>
  <!-- chest highlight (left-lit) -->
  <rect x="20" y="25" width="12" height="14" rx="1" fill="#3355dd" opacity="0.7"/>
  <!-- shadow side -->
  <rect x="32" y="25" width="11" height="14" rx="1" fill="#1133aa" opacity="0.6"/>
  <!-- belt -->
  <rect x="19" y="41" width="25" height="4" rx="1" fill="#1a2a88" stroke="#1a1a2e" stroke-width="0.8"/>
  <!-- pauldrons -->
  <rect x="13" y="22" width="10" height="7" rx="3" fill="#3355cc" stroke="#1a1a2e" stroke-width="1.2"/>
  <rect x="40" y="22" width="10" height="7" rx="3" fill="#3355cc" stroke="#1a1a2e" stroke-width="1.2"/>
  <!-- gorget -->
  <rect x="26" y="20" width="11" height="6" rx="2" fill="#3355cc" stroke="#1a1a2e" stroke-width="1"/>

  <!-- === HEAD (chibi — large) === -->
  <!-- neck skin -->
  <rect x="27" y="16" width="9" height="6" rx="2" fill="#f5c880" stroke="#1a1a2e" stroke-width="1"/>
  <!-- head base -->
  <rect x="19" y="4" width="25" height="18" rx="4" fill="#f5c880" stroke="#1a1a2e" stroke-width="1.4"/>
  <!-- hair -->
  <rect x="19" y="4" width="25" height="6" rx="4" fill="#c08030" stroke="#1a1a2e" stroke-width="1"/>
  <!-- cheeks -->
  <circle cx="22" cy="15" r="2.5" fill="#e8a870" opacity="0.6"/>
  <circle cx="41" cy="15" r="2.5" fill="#e8a870" opacity="0.6"/>
  <!-- eyes -->
  <ellipse cx="26" cy="13" rx="3" ry="2.5" fill="#1a1a2e"/>
  <ellipse cx="37" cy="13" rx="3" ry="2.5" fill="#1a1a2e"/>
  <circle cx="25.5" cy="12.5" r="1" fill="#ffffff"/>
  <circle cx="36.5" cy="12.5" r="1" fill="#ffffff"/>
  <!-- eyebrows -->
  <rect x="23" y="9" width="6" height="1.5" rx="1" fill="#8b5010"/>
  <rect x="34" y="9" width="6" height="1.5" rx="1" fill="#8b5010"/>
  <!-- mouth -->
  <path d="M 28 18 Q 31.5 20 35 18" stroke="#c07048" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- helmet band (optional — removed for cleaner look) -->
</svg>
